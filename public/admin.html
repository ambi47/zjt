<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智荐通 - 后台管理</title>
    <script src="/vendor/tailwindcss.js"></script>
    <script src="/vendor/lucide.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="min-h-screen">
        <header class="bg-white border-b border-gray-200">
            <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                        <i data-lucide="settings" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <div class="font-bold leading-tight">智荐通</div>
                        <div class="text-xs text-gray-400 -mt-0.5">后台管理</div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <a href="/" class="text-sm text-blue-600 hover:underline">返回前台</a>
                    <button id="admin-logout" class="px-3 py-1.5 rounded-lg border border-gray-200 text-sm font-semibold hover:bg-gray-50">退出</button>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-6 py-8">
            <div id="admin-login" class="max-w-md mx-auto bg-white border border-gray-100 rounded-2xl p-6 shadow-sm hidden">
                <h1 class="text-lg font-bold mb-1">管理员登录</h1>
                <p class="text-sm text-gray-500 mb-6">使用管理员账号登录后管理资源与用户</p>
                <form id="admin-login-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">用户名</label>
                        <input id="admin-username" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="admin" required />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">密码</label>
                        <input id="admin-password" type="password" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="admin123456" required />
                    </div>
                    <div id="admin-login-error" class="text-sm text-red-600 hidden"></div>
                    <button class="w-full py-2.5 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition-colors">登录</button>
                </form>
                <div class="mt-4 text-xs text-gray-400">
                    默认管理员：admin / admin123456
                </div>
            </div>

            <div id="admin-panel" class="space-y-8 hidden">
                <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600">
                                <i data-lucide="users" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <div class="text-xs text-gray-400 font-bold uppercase tracking-wider">用户数</div>
                                <div class="text-2xl font-extrabold" id="stat-users">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600">
                                <i data-lucide="library" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <div class="text-xs text-gray-400 font-bold uppercase tracking-wider">资源数</div>
                                <div class="text-2xl font-extrabold" id="stat-resources">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600">
                                <i data-lucide="database" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <div class="text-xs text-gray-400 font-bold uppercase tracking-wider">数据库</div>
                                <div class="text-sm font-bold text-gray-700" id="stat-db">SQLite(sql.js)</div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold">资源管理</h2>
                        <button id="refresh-resources" class="px-3 py-1.5 rounded-lg border border-gray-200 text-sm font-semibold hover:bg-gray-50 flex items-center gap-2">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                            刷新
                        </button>
                    </div>

                    <form id="resource-create-form" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <input id="res-title" class="px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="标题" required />
                        <input id="res-category" class="px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="分类（如：编程开发）" required />
                        <input id="res-students" class="px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="学习人数（如：1.2k）" />
                        <input id="res-emoji" class="px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="封面 Emoji（如：🐍）" />
                        <input id="res-icon" class="px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="图标（lucide 名称）" />
                        <input id="res-color" class="px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="颜色（如：blue/indigo）" />
                        <textarea id="res-desc" class="md:col-span-3 px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" rows="2" placeholder="简介" required></textarea>
                        <div class="md:col-span-3 flex items-center justify-between">
                            <div id="resource-create-error" class="text-sm text-red-600 hidden"></div>
                            <button class="px-4 py-2 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700">新增资源</button>
                        </div>
                    </form>

                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="text-left text-gray-400">
                                    <th class="py-2 pr-3">ID</th>
                                    <th class="py-2 pr-3">标题</th>
                                    <th class="py-2 pr-3">分类</th>
                                    <th class="py-2 pr-3">封面</th>
                                    <th class="py-2 pr-3">人数</th>
                                    <th class="py-2 pr-3"></th>
                                </tr>
                            </thead>
                            <tbody id="resources-table" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </section>

                <section class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold">用户列表</h2>
                        <button id="refresh-users" class="px-3 py-1.5 rounded-lg border border-gray-200 text-sm font-semibold hover:bg-gray-50 flex items-center gap-2">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                            刷新
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="text-left text-gray-400">
                                    <th class="py-2 pr-3">用户名</th>
                                    <th class="py-2 pr-3">邮箱</th>
                                    <th class="py-2 pr-3">角色</th>
                                    <th class="py-2 pr-3">积分</th>
                                    <th class="py-2 pr-3">学习天数</th>
                                </tr>
                            </thead>
                            <tbody id="users-table" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="/admin.js"></script>
</body>
</html>
